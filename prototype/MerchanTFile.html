<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MerchanTFile · Prototype</title>

  <!-- Geist family — clean, neutral, corporate-but-modern -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0; padding: 0;
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      background: #f0eee9; color: #0f172a;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body { min-height: 100vh; }
    button { font-family: inherit; }
    code { font-family: 'Geist Mono', ui-monospace, 'SFMono-Regular', monospace; }
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    *::-webkit-scrollbar-track { background: transparent; }
  </style>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
          integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
          integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Components: shared first, then variations, then starters, then app -->
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="variation-a.jsx"></script>
  <script type="text/babel" src="variation-b.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="browser-window.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#1E40AF",
      "density": "comfy",
      "showFrame": true
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Each variation lives inside a browser chrome (optional) inside an artboard.
      const variationFrame = (children, url) => (
        t.showFrame ? (
          <ChromeWindow
            tabs={[{ title: 'MerchanTFile · Admin', active: true }]}
            activeIndex={0}
            url={url}
            width={1280}
            height={800}
          >
            {children}
          </ChromeWindow>
        ) : (
          <div style={{ width: 1280, height: 800, borderRadius: 10, overflow: 'hidden',
                        boxShadow: '0 24px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(15,23,42,0.08)' }}>
            {children}
          </div>
        )
      );

      return (
        <DesignCanvas title="MerchanTFile" subtitle="Excel → filled PDF · 2 design directions">
          <DCSection
            id="variations"
            title="Variations"
            subtitle="Side-by-side prototypes. Click around — each is fully interactive."
          >
            <DCArtboard
              id="variation-a"
              label="A · Admin dashboard"
              width={1280}
              height={800}
            >
              {variationFrame(
                <VariationA accent={t.accent} density={t.density} />,
                'merchantfile.id/admin'
              )}
            </DCArtboard>

            <DCArtboard
              id="variation-b"
              label="B · Guided wizard"
              width={1280}
              height={800}
            >
              {variationFrame(
                <VariationB accent={t.accent} density={t.density} />,
                'merchantfile.id/generate'
              )}
            </DCArtboard>
          </DCSection>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Theme" />
            <TweakColor
              label="Accent"
              value={t.accent}
              options={['#1E40AF', '#0F766E', '#0369A1', '#1E293B']}
              onChange={(v) => setTweak('accent', v)}
            />
            <TweakRadio
              label="Density"
              value={t.density}
              options={['compact', 'comfy']}
              onChange={(v) => setTweak('density', v)}
            />
            <TweakSection label="Frame" />
            <TweakToggle
              label="Show browser chrome"
              value={t.showFrame}
              onChange={(v) => setTweak('showFrame', v)}
            />
          </TweaksPanel>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
